version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: forex-sim-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: forex_sim
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: forex-sim-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Go API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: forex-sim-api
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=forex_sim
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=your-secret-key-change-in-production
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY:-}
      - OANDA_API_KEY=${OANDA_API_KEY:-}
      - OANDA_ACCOUNT_ID=${OANDA_ACCOUNT_ID:-}
      - MODEL_PATH=/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./models:/app/models
    restart: unless-stopped

  # ML Training Service (placeholder)
  ml-service:
    build:
      context: ./ml
      dockerfile: Dockerfile
    container_name: forex-sim-ml
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=forex_sim
      - MODEL_PATH=/app/models
    volumes:
      - ./models:/app/models
      - ml_training_data:/app/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  ml_training_data:

networks:
  default:
    name: forex-sim-network
